<svg viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="45%" stop-color="#04060f"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#050914"/>
    </linearGradient>
    <filter id="blurXL"><feGaussianBlur stdDeviation="70"/></filter>
    <filter id="blurMD"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- ambient glows -->
  <circle cx="220" cy="120" r="180" fill="#3B82F6" opacity="0.25" filter="url(#blurXL)"/>
  <circle cx="760" cy="430" r="160" fill="#22D3EE" opacity="0.2" filter="url(#blurXL)"/>
  <circle cx="1250" cy="140" r="220" fill="#8B5CF6" opacity="0.28" filter="url(#blurXL)">
    <animate attributeName="opacity" values="0.18;0.32;0.18" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- circuit trace lines -->
  <g stroke="#1E3A8A" stroke-width="1.2" opacity="0.35" fill="none">
    <path d="M0,60 H120 L150,90 H320"/>
    <path d="M0,440 H90 L120,410 H260"/>
    <path d="M1500,80 H1380 L1350,110 H1180"/>
    <path d="M1500,420 H1400 L1370,390 H1220"/>
    <circle cx="320" cy="90" r="4" fill="#3B82F6"/>
    <circle cx="1180" cy="110" r="4" fill="#22D3EE"/>
  </g>

  <!-- particles -->
  <g fill="#93C5FD">
    <circle cx="410" cy="60" r="2.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="640" cy="120" r="1.8"><animate attributeName="opacity" values="1;0.2;1" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="70" r="2"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="420" r="2.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="400" r="1.6"><animate attributeName="opacity" values="1;0.3;1" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="220" cy="380" r="2"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ===== LEFT: stacked monitors ===== -->
  <g transform="translate(60,120)">
    <!-- monitor 1: react code -->
    <g transform="rotate(-4)">
      <rect width="300" height="190" rx="10" fill="url(#screenGlow)" stroke="#3B82F6" stroke-width="1.6" opacity="0.95"/>
      <rect x="0" y="0" width="300" height="26" rx="10" fill="#0B1220" stroke="#1E3A8A" stroke-width="1"/>
      <circle cx="16" cy="13" r="4" fill="#EF4444"/><circle cx="30" cy="13" r="4" fill="#F59E0B"/><circle cx="44" cy="13" r="4" fill="#22C55E"/>
      <text x="16" y="55" font-family="Consolas,monospace" font-size="12" fill="#60A5FA">const App = () =&gt; {</text>
      <text x="30" y="75" font-family="Consolas,monospace" font-size="12" fill="#A855F7">return</text>
      <text x="30" y="95" font-family="Consolas,monospace" font-size="12" fill="#22D3EE">&lt;Dashboard /&gt;</text>
      <text x="16" y="115" font-family="Consolas,monospace" font-size="12" fill="#60A5FA">}</text>
      <rect x="16" y="135" width="180" height="8" rx="4" fill="#1E3A8A" opacity="0.6"/>
      <rect x="16" y="150" width="120" height="8" rx="4" fill="#1E3A8A" opacity="0.6"/>
      <rect x="16" y="165" width="150" height="8" rx="4" fill="#1E3A8A" opacity="0.6"/>
    </g>
  </g>

  <g transform="translate(120,260)">
    <!-- monitor 2: github graph -->
    <g transform="rotate(3)">
      <rect width="280" height="170" rx="10" fill="url(#screenGlow)" stroke="#22D3EE" stroke-width="1.6" opacity="0.95"/>
      <text x="16" y="26" font-family="Verdana" font-size="12" fill="#93C5FD">Contribution Graph</text>
      <g transform="translate(16,40)">
        <!-- mini grid heat map -->
        <g fill="#0F2942">
          <rect x="0" y="0" width="10" height="10" rx="2"/><rect x="14" y="0" width="10" height="10" rx="2" fill="#1E3A8A"/><rect x="28" y="0" width="10" height="10" rx="2" fill="#3B82F6"/><rect x="42" y="0" width="10" height="10" rx="2"/><rect x="56" y="0" width="10" height="10" rx="2" fill="#22D3EE"/><rect x="70" y="0" width="10" height="10" rx="2" fill="#1E3A8A"/><rect x="84" y="0" width="10" height="10" rx="2"/><rect x="98" y="0" width="10" height="10" rx="2" fill="#3B82F6"/><rect x="112" y="0" width="10" height="10" rx="2"/><rect x="126" y="0" width="10" height="10" rx="2" fill="#1E3A8A"/><rect x="140" y="0" width="10" height="10" rx="2" fill="#22D3EE"/><rect x="154" y="0" width="10" height="10" rx="2"/><rect x="168" y="0" width="10" height="10" rx="2" fill="#3B82F6"/><rect x="182" y="0" width="10" height="10" rx="2"/><rect x="196" y="0" width="10" height="10" rx="2" fill="#1E3A8A"/><rect x="210" y="0" width="10" height="10" rx="2" fill="#22D3EE"/>

          <rect x="0" y="14" width="10" height="10" rx="2" fill="#1E3A8A"/><rect x="14" y="14" width="10" height="10" rx="2" fill="#3B82F6"/><rect x="28" y="14" width="10" height="10" rx="2"/><rect x="42" y="14" width="10" height="10" rx="2" fill="#22D3EE"/><rect x="56" y="14" width="10" height="10" rx="2"/><rect x="70" y="14" width="10" height="10" rx="2" fill="#3B82F6"/><rect x="84" y="14" width="10" height="10" rx="2" fill="#1E3A8A"/><rect x="98" y="14" width="10" height="10" rx="2"/><rect x="112" y="14" width="10" height="10" rx="2" fill="#22D3EE"/><rect x="126" y="14" width="10" height="10" rx="2"/><rect x="140" y="14" width="10" height="10" rx="2" fill="#1E3A8A"/><rect x="154" y="14" width="10" height="10" rx="2" fill="#3B82F6"/><rect x="168" y="14" width="10" height="10" rx="2"/><rect x="182" y="14" width="10" height="10" rx="2" fill="#22D3EE"/><rect x="196" y="14" width="10" height="10" rx="2" fill="#1E3A8A"/><rect x="210" y="14" width="10" height="10" rx="2"/>

          <rect x="0" y="28" width="10" height="10" rx="2" fill="#3B82F6"/><rect x="14" y="28" width="10" height="10" rx="2"/><rect x="28" y="28" width="10" height="10" rx="2" fill="#22D3EE"/><rect x="42" y="28" width="10" height="10" rx="2" fill="#1E3A8A"/><rect x="56" y="28" width="10" height="10" rx="2"/><rect x="70" y="28" width="10" height="10" rx="2" fill="#22D3EE"/><rect x="84" y="28" width="10" height="10" rx="2" fill="#3B82F6"/><rect x="98" y="28" width="10" height="10" rx="2"/><rect x="112" y="28" width="10" height="10" rx="2" fill="#1E3A8A"/><rect x="126" y="28" width="10" height="10" rx="2" fill="#22D3EE"/><rect x="140" y="28" width="10" height="10" rx="2"/><rect x="154" y="28" width="10" height="10" rx="2"/><rect x="168" y="28" width="10" height="10" rx="2" fill="#3B82F6"/><rect x="182" y="28" width="10" height="10" rx="2" fill="#1E3A8A"/><rect x="196" y="28" width="10" height="10" rx="2"/><rect x="210" y="28" width="10" height="10" rx="2" fill="#22D3EE"/>
        </g>
      </g>
      <text x="16" y="145" font-family="Verdana" font-size="11" fill="#6B7280">528 contributions this year</text>
    </g>
  </g>

  <!-- ===== CENTER: laptop with floating code + AI dashboard monitor ===== -->
  <g transform="translate(560,90)">
    <rect width="330" height="200" rx="10" fill="url(#screenGlow)" stroke="url(#neon)" stroke-width="2"/>
    <text x="18" y="30" font-family="Verdana" font-size="13" fill="#93C5FD">AI Dashboard</text>
    <circle cx="300" cy="24" r="6" fill="#22C55E"><animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/></circle>
    <!-- bars -->
    <g transform="translate(20,150)">
      <rect x="0" y="-40" width="16" height="40" fill="#3B82F6" opacity="0.85"/>
      <rect x="24" y="-70" width="16" height="70" fill="#22D3EE" opacity="0.85"/>
      <rect x="48" y="-25" width="16" height="25" fill="#8B5CF6" opacity="0.85"/>
      <rect x="72" y="-55" width="16" height="55" fill="#3B82F6" opacity="0.85"/>
      <rect x="96" y="-90" width="16" height="90" fill="#22D3EE" opacity="0.85"/>
    </g>
    <!-- radial AI node graph -->
    <g transform="translate(240,110)" stroke="#60A5FA" stroke-width="1" opacity="0.8">
      <circle r="34" fill="none"/>
      <circle r="3" fill="#22D3EE" cx="34" cy="0"/>
      <circle r="3" fill="#8B5CF6" cx="-24" cy="24"/>
      <circle r="3" fill="#3B82F6" cx="-24" cy="-24"/>
      <circle r="3" fill="#22D3EE" cx="0" cy="34"/>
      <line x1="0" y1="0" x2="34" y2="0"/><line x1="0" y1="0" x2="-24" y2="24"/><line x1="0" y1="0" x2="-24" y2="-24"/><line x1="0" y1="0" x2="0" y2="34"/>
    </g>
  </g>

  <!-- laptop -->
  <g transform="translate(555,300)">
    <path d="M20,0 L280,0 L300,90 L0,90 Z" fill="#0A0F1C" stroke="url(#neon)" stroke-width="1.6"/>
    <rect x="30" y="8" width="240" height="66" rx="4" fill="#020617"/>
    <rect x="34" y="12" width="232" height="58" rx="2" fill="url(#screenGlow)"/>
    <text x="46" y="34" font-family="Consolas,monospace" font-size="10" fill="#60A5FA">$ npm run build</text>
    <text x="46" y="50" font-family="Consolas,monospace" font-size="10" fill="#22D3EE">✔ compiled successfully</text>
    <text x="46" y="66" font-family="Consolas,monospace" font-size="10" fill="#A855F7">deploying to production...</text>
    <rect x="-30" y="90" width="360" height="14" rx="4" fill="#0A0F1C" stroke="url(#neon)" stroke-width="1"/>
    <rect x="120" y="94" width="60" height="4" rx="2" fill="#3B82F6" opacity="0.7"/>
  </g>

  <!-- floating code brackets around laptop -->
  <g font-family="Consolas,monospace" font-size="26" fill="#3B82F6" opacity="0.7" filter="url(#glow)">
    <text x="440" y="330">&lt;/&gt;</text>
    <text x="900" y="360">{ }</text>
    <text x="470" y="420">AI</text>
  </g>

  <!-- ===== RIGHT: AI brain hologram + name ===== -->
  <g transform="translate(1170,220)">
    <circle r="90" fill="none" stroke="#22D3EE" stroke-width="1" opacity="0.35"/>
    <circle r="90" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.25">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="14s" repeatCount="indefinite"/>
    </circle>
    <g stroke="#60A5FA" stroke-width="1" opacity="0.85" fill="#22D3EE">
      <line x1="0" y1="-60" x2="40" y2="-30"/><line x1="40" y1="-30" x2="55" y2="10"/>
      <line x1="55" y1="10" x2="20" y2="55"/><line x1="20" y1="55" x2="-30" y2="50"/>
      <line x1="-30" y1="50" x2="-55" y2="0"/><line x1="-55" y1="0" x2="-30" y2="-45"/>
      <line x1="-30" y1="-45" x2="0" y2="-60"/><line x1="0" y1="-60" x2="0" y2="0"/>
      <line x1="0" y1="0" x2="40" y2="-30"/><line x1="0" y1="0" x2="55" y2="10"/>
      <line x1="0" y1="0" x2="20" y2="55"/><line x1="0" y1="0" x2="-30" y2="50"/>
      <line x1="0" y1="0" x2="-55" y2="0"/><line x1="0" y1="0" x2="-30" y2="-45"/>
      <circle cx="0" cy="-60" r="3"/><circle cx="40" cy="-30" r="3"/><circle cx="55" cy="10" r="3"/>
      <circle cx="20" cy="55" r="3"/><circle cx="-30" cy="50" r="3"/><circle cx="-55" cy="0" r="3"/>
      <circle cx="-30" cy="-45" r="3"/><circle cx="0" cy="0" r="4" fill="#ffffff"/>
    </g>
    <text x="0" y="120" text-anchor="middle" font-family="Verdana" font-size="13" fill="#67E8F9" letter-spacing="2">AI CORE</text>
  </g>

  <!-- name block -->
  <g transform="translate(940,110)">
    <text x="0" y="0" font-family="Verdana" font-size="54" font-weight="bold" fill="url(#neon)" filter="url(#glow)">SHOAIB KAZI</text>
    <text x="0" y="40" font-family="Verdana" font-size="19" fill="#93C5FD">Full Stack Developer · AI Developer</text>
    <rect x="0" y="58" width="260" height="34" rx="17" fill="#0B1220" stroke="url(#neon)" stroke-width="1.3"/>
    <text x="18" y="80" font-family="Verdana" font-size="14" fill="#C4B5FD" letter-spacing="0.5">FOUNDER OF SK TECHVERSE</text>
  </g>

  <!-- base neon line -->
  <rect x="0" y="494" width="1500" height="6" fill="url(#neon)" opacity="0.85"/>
</svg>
