<svg viewBox="0 0 1000 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05060f"/>
      <stop offset="100%" stop-color="#03040a"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3B82F6" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
    <filter id="blurXL"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cardClip"><rect x="10" y="10" width="980" height="440" rx="26"/></clipPath>
  </defs>

  <rect width="1000" height="460" fill="#000000"/>

  <g clip-path="url(#cardClip)">
    <rect x="10" y="10" width="980" height="440" rx="26" fill="url(#bg)"/>

    <circle cx="80" cy="60" r="140" fill="#3B82F6" opacity="0.22" filter="url(#blurXL)"/>
    <circle cx="920" cy="410" r="160" fill="#8B5CF6" opacity="0.22" filter="url(#blurXL)">
      <animate attributeName="opacity" values="0.14;0.28;0.14" dur="5s" repeatCount="indefinite"/>
    </circle>

    <!-- header -->
    <text x="50" y="72" font-family="Verdana" font-size="34" font-weight="bold" fill="url(#neon)" filter="url(#glow)">About Me</text>
    <rect x="52" y="86" width="120" height="4" rx="2" fill="url(#neon)">
      <animate attributeName="width" values="0;120;120" keyTimes="0;0.4;1" dur="2.4s" repeatCount="indefinite"/>
    </rect>

    <text x="50" y="120" font-family="Verdana" font-size="16" fill="#93C5FD">Founder, SK TechVerse · Full Stack &amp; AI Developer</text>

    <!-- intro line -->
    <text x="50" y="155" font-family="Verdana" font-size="14.5" fill="#CBD5E1">I design and ship premium, production-ready digital products —</text>
    <text x="50" y="176" font-family="Verdana" font-size="14.5" fill="#CBD5E1">end to end, from architecture to deployment.</text>

    <!-- checklist with scanning highlight -->
    <g transform="translate(50,205)">
      <rect x="-14" y="-22" width="900" height="230" fill="url(#scanGrad)">
        <animateTransform attributeName="transform" type="translate" values="-300,0;900,0;-300,0" dur="6s" repeatCount="indefinite"/>
      </rect>

      <!-- row template: icon circle + text -->
      <g font-family="Verdana" font-size="15" fill="#E5E7EB">
        <g transform="translate(0,0)">
          <circle r="10" fill="#0F172A" stroke="#3B82F6" stroke-width="2"/>
          <path d="M-4,0 L-1,3 L5,-4" stroke="#3B82F6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="22" y="5">Passionate Full Stack Developer — MERN stack, end to end</text>
        </g>
        <g transform="translate(0,34)">
          <circle r="10" fill="#0F172A" stroke="#8B5CF6" stroke-width="2"/>
          <path d="M-4,0 L-1,3 L5,-4" stroke="#8B5CF6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="22" y="5">AI Enthusiast — integrating LLMs into real products</text>
        </g>
        <g transform="translate(0,68)">
          <circle r="10" fill="#0F172A" stroke="#22D3EE" stroke-width="2"/>
          <path d="M-4,0 L-1,3 L5,-4" stroke="#22D3EE" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="22" y="5">Building premium business websites, dashboards &amp; admin systems</text>
        </g>
        <g transform="translate(0,102)">
          <circle r="10" fill="#0F172A" stroke="#3B82F6" stroke-width="2"/>
          <path d="M-4,0 L-1,3 L5,-4" stroke="#3B82F6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="22" y="5">Clean UI/UX lover — glassmorphism, dark-premium aesthetics</text>
        </g>
        <g transform="translate(0,136)">
          <circle r="10" fill="#0F172A" stroke="#8B5CF6" stroke-width="2"/>
          <path d="M-4,0 L-1,3 L5,-4" stroke="#8B5CF6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="22" y="5">Available as a freelancer for client projects</text>
        </g>
        <g transform="translate(0,170)">
          <circle r="10" fill="#0F172A" stroke="#22D3EE" stroke-width="2"/>
          <path d="M-4,0 L-1,3 L5,-4" stroke="#22D3EE" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="22" y="5">Solving real-world problems with code, not just demos</text>
        </g>
      </g>
    </g>

    <!-- stat chips -->
    <g transform="translate(50,410)" font-family="Verdana" font-size="13" fill="#C4B5FD">
      <rect x="0" y="-20" width="150" height="32" rx="16" fill="#0F172A" stroke="url(#neon)" stroke-width="1.2"/>
      <text x="16" y="1">🎓 MCA Student</text>

      <rect x="164" y="-20" width="150" height="32" rx="16" fill="#0F172A" stroke="url(#neon)" stroke-width="1.2"/>
      <text x="180" y="1">📍 Mumbai, India</text>

      <rect x="328" y="-20" width="190" height="32" rx="16" fill="#0F172A" stroke="url(#neon)" stroke-width="1.2"/>
      <text x="344" y="1">⚡ Full Stack + AI Dev</text>

      <rect x="532" y="-20" width="170" height="32" rx="16" fill="#0F172A" stroke="url(#neon)" stroke-width="1.2"/>
      <text x="548" y="1">🚀 SK TechVerse</text>
    </g>
  </g>

  <rect x="10" y="10" width="980" height="440" rx="26" fill="none" stroke="url(#neon)" stroke-width="2" opacity="0.75">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
