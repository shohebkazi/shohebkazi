<svg viewBox="0 0 1000 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05060f"/>
      <stop offset="55%" stop-color="#070b1a"/>
      <stop offset="100%" stop-color="#02030a"/>
    </linearGradient>

    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>

    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>

    <filter id="blurBig"><feGaussianBlur stdDeviation="55"/></filter>
    <filter id="blurSmall"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="glowText" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="photoClip">
      <circle cx="200" cy="270" r="130"/>
    </clipPath>

    <clipPath id="cardClip">
      <rect x="20" y="60" width="960" height="480" rx="28"/>
    </clipPath>
  </defs>

  <rect width="1000" height="580" fill="#000000"/>

  <!-- lanyard strap -->
  <rect x="470" y="0" width="60" height="70" fill="url(#neonGrad)" opacity="0.85"/>
  <circle cx="500" cy="70" r="14" fill="#05060f" stroke="url(#ringGrad)" stroke-width="4"/>

  <g clip-path="url(#cardClip)">
    <rect x="20" y="60" width="960" height="480" rx="28" fill="url(#bgGrad)"/>

    <!-- glow blobs -->
    <circle cx="120" cy="120" r="130" fill="#3B82F6" filter="url(#blurBig)" opacity="0.35">
      <animate attributeName="opacity" values="0.2;0.45;0.2" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="880" cy="480" r="160" fill="#A855F7" filter="url(#blurBig)" opacity="0.3">
      <animate attributeName="opacity" values="0.4;0.15;0.4" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="120" r="90" fill="#22D3EE" filter="url(#blurBig)" opacity="0.25">
      <animate attributeName="opacity" values="0.15;0.35;0.15" dur="4.5s" repeatCount="indefinite"/>
    </circle>

    <!-- grid lines texture -->
    <g stroke="#1E3A8A" stroke-width="1" opacity="0.15">
      <line x1="20" y1="180" x2="980" y2="180"/>
      <line x1="20" y1="420" x2="980" y2="420"/>
      <line x1="360" y1="60" x2="360" y2="540"/>
    </g>

    <!-- photo ring -->
    <circle cx="200" cy="270" r="138" fill="none" stroke="url(#ringGrad)" stroke-width="4" opacity="0.9">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="270" r="150" fill="none" stroke="#60A5FA" stroke-width="1.5" opacity="0.4">
      <animate attributeName="r" values="146;158;146" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0.05;0.45" dur="2.5s" repeatCount="indefinite"/>
    </circle>

    <g clip-path="url(#photoClip)">
      <image href="https://raw.githubusercontent.com/shohebkazi/shohebkazi/main/assets/sk-techverse-banner.png"
             x="70" y="140" width="260" height="260" preserveAspectRatio="xMidYMid slice"/>
    </g>

    <!-- status badge -->
    <circle cx="105" cy="395" r="9" fill="#22C55E">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="122" y="400" font-family="Verdana, sans-serif" font-size="15" fill="#9CA3AF">Available for freelance work</text>

    <!-- name block -->
    <g filter="url(#glowText)">
      <text x="380" y="215" font-family="Verdana, sans-serif" font-size="52" font-weight="bold" fill="url(#neonGrad)" opacity="0">
        SHOHEB KAZI
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.15;0.5" dur="1.6s" fill="freeze"/>
      </text>
    </g>
    <text x="382" y="255" font-family="Verdana, sans-serif" font-size="22" fill="#93C5FD" opacity="0">
      Full Stack Developer
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.3;0.7" dur="1.8s" fill="freeze"/>
    </text>

    <rect x="380" y="278" width="255" height="34" rx="17" fill="#0F172A" stroke="url(#ringGrad)" stroke-width="1.2" opacity="0">
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.4;0.8" dur="2s" fill="freeze"/>
    </rect>
    <text x="398" y="300" font-family="Verdana, sans-serif" font-size="15" fill="#C4B5FD" opacity="0">
      FOUNDER · SK TECHVERSE
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.4;0.8" dur="2s" fill="freeze"/>
    </text>

    <text x="382" y="345" font-family="Verdana, sans-serif" font-size="14" fill="#6B7280" opacity="0">
      React · Node.js · MongoDB · Python · AI Integrations
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.5;0.9" dur="2.2s" fill="freeze"/>
    </text>

    <!-- tech chips top right -->
    <g font-family="Verdana, sans-serif" font-size="13" fill="#93C5FD">
      <g>
        <rect x="760" y="90" width="150" height="30" rx="15" fill="#0F172A" stroke="#3B82F6" stroke-width="1" opacity="0.85"/>
        <text x="778" y="110">⚛ React</text>
      </g>
      <g>
        <rect x="760" y="130" width="150" height="30" rx="15" fill="#0F172A" stroke="#22C55E" stroke-width="1" opacity="0.85"/>
        <text x="778" y="150">⬢ Node.js</text>
      </g>
      <g>
        <rect x="760" y="170" width="150" height="30" rx="15" fill="#0F172A" stroke="#A855F7" stroke-width="1" opacity="0.85"/>
        <text x="778" y="190">🍃 MongoDB</text>
      </g>
    </g>

    <!-- bottom strip: barcode + ID -->
    <g transform="translate(380,470)">
      <text x="0" y="0" font-family="Verdana, sans-serif" font-size="13" fill="#6B7280">DEV ID: SK-2026-FULLSTACK</text>
      <g transform="translate(0,15)" fill="#93C5FD" opacity="0.8">
        <rect x="0" y="0" width="2" height="26"/><rect x="6" y="0" width="4" height="26"/>
        <rect x="14" y="0" width="1" height="26"/><rect x="19" y="0" width="3" height="26"/>
        <rect x="26" y="0" width="2" height="26"/><rect x="32" y="0" width="5" height="26"/>
        <rect x="41" y="0" width="1" height="26"/><rect x="46" y="0" width="3" height="26"/>
        <rect x="53" y="0" width="2" height="26"/><rect x="59" y="0" width="4" height="26"/>
        <rect x="67" y="0" width="1" height="26"/><rect x="72" y="0" width="3" height="26"/>
        <rect x="79" y="0" width="6" height="26"/><rect x="89" y="0" width="2" height="26"/>
        <rect x="95" y="0" width="1" height="26"/><rect x="100" y="0" width="4" height="26"/>
        <rect x="108" y="0" width="2" height="26"/><rect x="114" y="0" width="3" height="26"/>
      </g>
    </g>

    <text x="700" y="500" font-family="Verdana, sans-serif" font-size="13" fill="#4B5563" text-anchor="end">
      Mumbai, India · Building The Future
    </text>
  </g>

  <!-- outer neon border -->
  <rect x="20" y="60" width="960" height="480" rx="28" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" opacity="0.8">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
