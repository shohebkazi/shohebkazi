    </path>
    <path d="M -16 -22 L 0 -6 L 16 -22" fill="none" stroke="url(#arrowGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.45">
      <animateTransform attributeName="transform" type="translate" values="0,-6;0,10;0,-6" dur="1.6s" repeatCount="indefinite" begin="0.15s"/>
      <animate attributeName="opacity" values="0.45;0.1;0.45" dur="1.6s" repeatCount="indefinite" begin="0.15s"/>
    </path>
