<svg viewBox="0 0 1000 660" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05060f"/>
      <stop offset="100%" stop-color="#03040a"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="blurXL"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cardClip"><rect x="10" y="10" width="980" height="640" rx="26"/></clipPath>

    <!-- reusable service card -->
    <g id="cardBase">
      <rect width="300" height="110" rx="16" fill="#0B1220" stroke="#1E3A8A" stroke-width="1.4"/>
    </g>
  </defs>

  <rect width="1000" height="660" fill="#000000"/>

  <g clip-path="url(#cardClip)">
    <rect x="10" y="10" width="980" height="640" rx="26" fill="url(#bg)"/>

    <circle cx="60" cy="40" r="140" fill="#3B82F6" opacity="0.2" filter="url(#blurXL)"/>
    <circle cx="940" cy="620" r="170" fill="#8B5CF6" opacity="0.2" filter="url(#blurXL)">
      <animate attributeName="opacity" values="0.12;0.26;0.12" dur="5s" repeatCount="indefinite"/>
    </circle>

    <!-- header -->
    <text x="50" y="72" font-family="Verdana" font-size="34" font-weight="bold" fill="url(#neon)" filter="url(#glow)">Services</text>
    <rect x="52" y="86" width="130" height="4" rx="2" fill="url(#neon)">
      <animate attributeName="width" values="0;130;130" keyTimes="0;0.4;1" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <text x="50" y="118" font-family="Verdana" font-size="16" fill="#93C5FD">What I can build for your business</text>

    <!-- grid: 3 cols x 4 rows, cards start at (50,150) with 20px gap, card 300x110 -->
    <g transform="translate(50,150)" font-family="Verdana">

      <!-- row 1 -->
      <g transform="translate(0,0)">
        <use href="#cardBase" stroke="#3B82F6"/>
        <rect width="300" height="110" rx="16" fill="none" stroke="#3B82F6" stroke-width="2.4" opacity="0">
          <animate attributeName="opacity" values="0;1;0" dur="4.4s" begin="0s" repeatCount="indefinite"/>
        </rect>
        <text x="24" y="44" font-size="26">🌐</text>
        <text x="24" y="78" font-size="16" fill="#E5E7EB" font-weight="bold">Business Websites</text>
      </g>

      <g transform="translate(320,0)">
        <use href="#cardBase" stroke="#8B5CF6"/>
        <rect width="300" height="110" rx="16" fill="none" stroke="#8B5CF6" stroke-width="2.4" opacity="0">
          <animate attributeName="opacity" values="0;1;0" dur="4.4s" begin="0.4s" repeatCount="indefinite"/>
        </rect>
        <text x="24" y="44" font-size="26">🤖</text>
        <text x="24" y="78" font-size="16" fill="#E5E7EB" font-weight="bold">AI Applications</text>
      </g>

      <g transform="translate(640,0)">
        <use href="#cardBase" stroke="#22D3EE"/>
        <rect width="300" height="110" rx="16" fill="none" stroke="#22D3EE" stroke-width="2.4" opacity="0">
          <animate attributeName="opacity" values="0;1;0" dur="4.4s" begin="0.8s" repeatCount="indefinite"/>
        </rect>
        <text x="24" y="44" font-size="26">📊</text>
        <text x="24" y="78" font-size="16" fill="#E5E7EB" font-weight="bold">Dashboard Systems</text>
      </g>

      <!-- row 2 -->
      <g transform="translate(0,130)">
        <use href="#cardBase" stroke="#3B82F6"/>
        <rect width="300" height="110" rx="16" fill="none" stroke="#3B82F6" stroke-width="2.4" opacity="0">
          <animate attributeName="opacity" values="0;1;0" dur="4.4s" begin="1.2s" repeatCount="indefinite"/>
        </rect>
        <text x="24" y="44" font-size="26">🔐</text>
        <text x="24" y="78" font-size="16" fill="#E5E7EB" font-weight="bold">Admin Panels</text>
      </g>

      <g transform="translate(320,130)">
        <use href="#cardBase" stroke="#8B5CF6"/>
        <rect width="300" height="110" rx="16" fill="none" stroke="#8B5CF6" stroke-width="2.4" opacity="0">
          <animate attributeName="opacity" values="0;1;0" dur="4.4s" begin="1.6s" repeatCount="indefinite"/>
        </rect>
        <text x="24" y="44" font-size="26">🎨</text>
        <text x="24" y="78" font-size="16" fill="#E5E7EB" font-weight="bold">Portfolio Websites</text>
      </g>

      <g transform="translate(640,130)">
        <use href="#cardBase" stroke="#22D3EE"/>
        <rect width="300" height="110" rx="16" fill="none" stroke="#22D3EE" stroke-width="2.4" opacity="0">
          <animate attributeName="opacity" values="0;1;0" dur="4.4s" begin="2.0s" repeatCount="indefinite"/>
        </rect>
        <text x="24" y="44" font-size="26">🛒</text>
        <text x="24" y="78" font-size="16" fill="#E5E7EB" font-weight="bold">E-Commerce</text>
      </g>

      <!-- row 3 -->
      <g transform="translate(0,260)">
        <use href="#cardBase" stroke="#3B82F6"/>
        <rect width="300" height="110" rx="16" fill="none" stroke="#3B82F6" stroke-width="2.4" opacity="0">
          <animate attributeName="opacity" values="0;1;0" dur="4.4s" begin="2.4s" repeatCount="indefinite"/>
        </rect>
        <text x="24" y="44" font-size="26">📦</text>
        <text x="24" y="78" font-size="16" fill="#E5E7EB" font-weight="bold">ERP Systems</text>
      </g>

      <g transform="translate(320,260)">
        <use href="#cardBase" stroke="#8B5CF6"/>
        <rect width="300" height="110" rx="16" fill="none" stroke="#8B5CF6" stroke-width="2.4" opacity="0">
          <animate attributeName="opacity" values="0;1;0" dur="4.4s" begin="2.8s" repeatCount="indefinite"/>
        </rect>
        <text x="24" y="44" font-size="26">🏋️</text>
        <text x="24" y="78" font-size="16" fill="#E5E7EB" font-weight="bold">Gym Management</text>
      </g>

      <g transform="translate(640,260)">
        <use href="#cardBase" stroke="#22D3EE"/>
        <rect width="300" height="110" rx="16" fill="none" stroke="#22D3EE" stroke-width="2.4" opacity="0">
          <animate attributeName="opacity" values="0;1;0" dur="4.4s" begin="3.2s" repeatCount="indefinite"/>
        </rect>
        <text x="24" y="44" font-size="26">🏥</text>
        <text x="24" y="78" font-size="16" fill="#E5E7EB" font-weight="bold">Hospital Management</text>
      </g>

      <!-- row 4 -->
      <g transform="translate(0,390)">
        <use href="#cardBase" stroke="#3B82F6"/>
        <rect width="300" height="110" rx="16" fill="none" stroke="#3B82F6" stroke-width="2.4" opacity="0">
          <animate attributeName="opacity" values="0;1;0" dur="4.4s" begin="3.6s" repeatCount="indefinite"/>
        </rect>
        <text x="24" y="44" font-size="26">🍽️</text>
        <text x="24" y="78" font-size="16" fill="#E5E7EB" font-weight="bold">Restaurant Billing</text>
      </g>

      <g transform="translate(320,390)">
        <use href="#cardBase" stroke="#8B5CF6"/>
        <rect width="300" height="110" rx="16" fill="none" stroke="#8B5CF6" stroke-width="2.4" opacity="0">
          <animate attributeName="opacity" values="0;1;0" dur="4.4s" begin="4.0s" repeatCount="indefinite"/>
        </rect>
        <text x="24" y="44" font-size="26">📈</text>
        <text x="24" y="78" font-size="16" fill="#E5E7EB" font-weight="bold">Forex Platforms</text>
      </g>

      <g transform="translate(640,390)">
        <rect width="300" height="110" rx="16" fill="#0B1220" stroke="url(#neon)" stroke-width="1.6" stroke-dasharray="6,5"/>
        <text x="24" y="44" font-size="26">✨</text>
        <text x="24" y="78" font-size="16" fill="#C4B5FD" font-weight="bold">Custom Solutions</text>
      </g>

    </g>
  </g>

  <rect x="10" y="10" width="980" height="640" rx="26" fill="none" stroke="url(#neon)" stroke-width="2" opacity="0.75">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
